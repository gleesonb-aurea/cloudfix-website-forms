<!-- CloudFix Contact Form - No reCAPTCHA Version -->
<div class="cloudfix-contact-form-wrapper">
    <style>
        .cloudfix-contact-form-wrapper {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .cloudfix-contact-form {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 40px auto;
        }
        
        .cloudfix-contact-form h2 {
            color: #1a365d;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .cloudfix-contact-form .form-subtitle {
            color: #4a5568;
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .cloudfix-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .cloudfix-form-row {
                grid-template-columns: 1fr;
            }
        }
        
        .cloudfix-form-group {
            margin-bottom: 20px;
        }
        
        .cloudfix-form-group label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .cloudfix-form-group.required label::after {
            content: ' *';
            color: #e53e3e;
        }
        
        .cloudfix-form-group input,
        .cloudfix-form-group textarea,
        .cloudfix-form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            background: #ffffff;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        
        .cloudfix-form-group input:focus,
        .cloudfix-form-group textarea:focus,
        .cloudfix-form-group select:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }
        
        .cloudfix-form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .cloudfix-checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 25px 0;
        }
        
        .cloudfix-checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 0;
            flex-shrink: 0;
        }
        
        .cloudfix-checkbox-wrapper label {
            font-size: 14px;
            line-height: 1.5;
            color: #4a5568;
            margin: 0;
            cursor: pointer;
        }
        
        .cloudfix-submit-btn {
            background: linear-gradient(135deg, #3182ce 0%, #2c5aa0 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
        }
        
        .cloudfix-submit-btn:hover {
            background: linear-gradient(135deg, #2c5aa0 0%, #2a4a7c 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(49, 130, 206, 0.4);
        }
        
        .cloudfix-submit-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .cloudfix-form-status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 15px;
            display: none;
            text-align: center;
        }
        
        .cloudfix-form-status.success {
            background: #f0fff4;
            color: #2f855a;
            border: 1px solid #9ae6b4;
        }
        
        .cloudfix-form-status.error {
            background: #fed7d7;
            color: #c53030;
            border: 1px solid #feb2b2;
        }
        
        .cloudfix-form-status.loading {
            background: #ebf8ff;
            color: #3182ce;
            border: 1px solid #90cdf4;
        }
        
        .cloudfix-help-text {
            color: #4a5568;
            font-size: 16px;
            line-height: 1.6;
            text-align: center;
            margin-top: 30px;
        }
    </style>
    
    <div class="cloudfix-contact-form">
        <h2>Contact CloudFix</h2>
        <p class="form-subtitle">Need help optimizing your AWS costs? Get in touch with our CloudFix team today.</p>
        
        <form id="cloudfix-contact-form">
            <div class="cloudfix-form-row">
                <div class="cloudfix-form-group required">
                    <label for="cf_firstName">First Name</label>
                    <input type="text" id="cf_firstName" name="firstName" required>
                </div>
                
                <div class="cloudfix-form-group required">
                    <label for="cf_lastName">Last Name</label>
                    <input type="text" id="cf_lastName" name="lastName" required>
                </div>
            </div>
            
            <div class="cloudfix-form-group required">
                <label for="cf_email">Email</label>
                <input type="email" id="cf_email" name="email" required>
            </div>
            
            <div class="cloudfix-form-group required">
                <label for="cf_company">Company Name</label>
                <input type="text" id="cf_company" name="company" required>
            </div>
            
            <div class="cloudfix-form-row">
                <div class="cloudfix-form-group">
                    <label for="cf_jobTitle">Job Title</label>
                    <input type="text" id="cf_jobTitle" name="jobTitle">
                </div>
                
                <div class="cloudfix-form-group">
                    <label for="cf_phone">Phone Number</label>
                    <input type="tel" id="cf_phone" name="phone">
                </div>
            </div>
            
            <div class="cloudfix-form-group">
                <label for="cf_message">How can we help you?</label>
                <textarea id="cf_message" name="message" placeholder="Tell us about your AWS environment and cost optimization goals..."></textarea>
            </div>
            
            <div class="cloudfix-checkbox-wrapper">
                <input type="checkbox" id="cf_newsletter" name="newsletter">
                <label for="cf_newsletter">I'd like to receive updates about CloudFix products and services</label>
            </div>
            
            <button type="submit" class="cloudfix-submit-btn">Send Message</button>
            
            <div class="cloudfix-form-status" id="cf-form-status"></div>
        </form>
        
        <p class="cloudfix-help-text">We're here to assist with any inquiries about our platform, features, or support options.</p>
    </div>
</div>

<script>
(function() {
    const WEBHOOK_URL = 'https://automate.billgleeson.com/webhook/cloudfix-website-forms';
    
    const form = document.getElementById('cloudfix-contact-form');
    const statusDiv = document.getElementById('cf-form-status');
    const submitBtn = form.querySelector('.cloudfix-submit-btn');
    
    function showStatus(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = `cloudfix-form-status ${type}`;
        statusDiv.style.display = 'block';
    }
    
    function hideStatus() {
        statusDiv.style.display = 'none';
    }
    
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        
        // Add additional data
        data.timestamp = new Date().toISOString();
        data.source = 'CloudFix Contact Form';
        data.page_url = window.location.href;
        data.user_agent = navigator.userAgent;
        data.form_type = 'contact';
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        showStatus('Sending your message...', 'loading');
        
        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
                mode: 'no-cors'
            });
            
            // With no-cors mode, we can't read the response, so assume success
            showStatus('Thank you! Your message has been sent successfully. We\'ll be in touch soon.', 'success');
            form.reset();
            
        } catch (error) {
            console.error('Form submission error:', error);
            showStatus('Sorry, there was an error sending your message. Please try again or contact us directly.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send Message';
        }
    });
})();
</script>
