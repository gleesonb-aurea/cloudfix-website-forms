<!-- CloudFix RightSpend Form - Embed this in WordPress -->
<div class="rightspend-form-wrapper">
    <style>
        .rightspend-form-wrapper {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .rightspend-form-container {
            background: rgb(238, 238, 238);
            padding: 60px 20px;
            border-radius: 15px;
            max-width: 940px;
            margin: 40px auto;
        }
        
        .rightspend-form {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            max-width: 600px;
            margin: 0 auto;
        }
        
        .rightspend-form h2 {
            color: #1a365d;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.2;
        }
        
        .rightspend-form .form-subtitle {
            color: #4a5568;
            font-size: 18px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 35px;
        }
        
        .rightspend-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .rightspend-form-row {
                grid-template-columns: 1fr;
            }
            .rightspend-form-container {
                padding: 40px 15px;
            }
            .rightspend-form {
                padding: 30px 20px;
            }
        }
        
        .rightspend-form-group {
            margin-bottom: 25px;
        }
        
        .rightspend-form-group label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 8px;
        }
        
        .rightspend-form-group.required label::after {
            content: ' *';
            color: #e53e3e;
        }
        
        .rightspend-form-group input,
        .rightspend-form-group select {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            background: #ffffff;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .rightspend-form-group input:focus,
        .rightspend-form-group select:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 4px rgba(49, 130, 206, 0.15);
            transform: translateY(-1px);
        }
        
        .rightspend-form-group select {
            cursor: pointer;
        }
        
        .spend-info {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 20px;
            margin: 25px 0;
        }
        
        .spend-info h4 {
            color: #2d3748;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .spend-info p {
            color: #4a5568;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }
        
        .rightspend-checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 25px 0;
        }
        
        .rightspend-checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin: 0;
            flex-shrink: 0;
        }
        
        .rightspend-checkbox-wrapper label {
            font-size: 14px;
            line-height: 1.5;
            color: #4a5568;
            margin: 0;
            cursor: pointer;
        }
        
        .rightspend-submit-btn {
            background: linear-gradient(135deg, #f6d55c 0%, #ed8936 100%);
            color: #2d3748;
            border: none;
            padding: 18px 40px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(246, 213, 92, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .rightspend-submit-btn:hover {
            background: linear-gradient(135deg, #ecc94b 0%, #dd6b20 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(246, 213, 92, 0.5);
        }
        
        .rightspend-submit-btn:disabled {
            background: #a0aec0;
            color: #718096;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .rightspend-form-status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 15px;
            display: none;
            text-align: center;
        }
        
        .rightspend-form-status.success {
            background: #f0fff4;
            color: #2f855a;
            border: 2px solid #9ae6b4;
        }
        
        .rightspend-form-status.error {
            background: #fed7d7;
            color: #c53030;
            border: 2px solid #feb2b2;
        }
        
        .rightspend-form-status.loading {
            background: #ebf8ff;
            color: #3182ce;
            border: 2px solid #90cdf4;
        }
        
        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
    
    <div class="rightspend-form-container">
        <div class="rightspend-form">
            <h2>Get Your RightSpend Estimate</h2>
            <p class="form-subtitle">Get a personalized assessment and 30-day free trial for your AWS environment.</p>

            <div id="rightspend-form-container">
                <div class="rightspend-form-row">
                    <div class="rightspend-form-group required">
                        <label for="rs_firstName">First Name</label>
                        <input type="text" id="rs_firstName" name="firstName">
                    </div>

                    <div class="rightspend-form-group required">
                        <label for="rs_lastName">Last Name</label>
                        <input type="text" id="rs_lastName" name="lastName">
                    </div>
                </div>

                <div class="rightspend-form-group required">
                    <label for="rs_email">Work Email</label>
                    <input type="email" id="rs_email" name="email">
                </div>

                <div class="rightspend-form-group required">
                    <label for="rs_company">Company Name</label>
                    <input type="text" id="rs_company" name="company">
                </div>


                <button type="button" class="rightspend-submit-btn" id="rs_submit_btn">Get RightSpend Estimate</button>

                <div class="rightspend-form-status" id="rs-form-status"></div>
            </div>
        </div>
    </div>
</div>

<!-- Load configuration -->
<script src="config-local.js" onerror="this.src='config.js'"></script>
<script>
(function() {
    // Skip initialization in WordPress admin
    if (document.body.classList.contains('wp-admin')) {
        return;
    }

    // Use configuration or fallback values
    const config = window.CloudFixConfig || {};
    const WEBHOOK_URL = config.WEBHOOK_URL || 'https://automate.billgleeson.com/webhook/cloudfix-website-forms';
    const WEBHOOK_SECRET = config.WEBHOOK_SECRET || '';
    const RECAPTCHA_SITE_KEY = config.RECAPTCHA_SITE_KEY || '6LctAb8rAAAAAG900ftMg2zJq13aLpJa5joqZ9yb';

    // Dynamically load reCAPTCHA with the correct site key
    const recaptchaScript = document.createElement('script');
    recaptchaScript.src = `https://www.google.com/recaptcha/api.js?render=${RECAPTCHA_SITE_KEY}`;
    document.head.appendChild(recaptchaScript);

    const container = document.getElementById('rightspend-form-container');
    const statusDiv = document.getElementById('rs-form-status');
    const submitBtn = document.getElementById('rs_submit_btn');

    // Form field elements
    const firstNameInput = document.getElementById('rs_firstName');
    const lastNameInput = document.getElementById('rs_lastName');
    const emailInput = document.getElementById('rs_email');
    const companyInput = document.getElementById('rs_company');

    function showStatus(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = `rightspend-form-status ${type}`;
        statusDiv.style.display = 'block';
    }

    function hideStatus() {
        statusDiv.style.display = 'none';
    }

    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    function validateForm() {
        if (!firstNameInput.value.trim()) {
            showStatus('Please enter your first name.', 'error');
            firstNameInput.focus();
            return false;
        }
        if (!lastNameInput.value.trim()) {
            showStatus('Please enter your last name.', 'error');
            lastNameInput.focus();
            return false;
        }
        if (!emailInput.value.trim() || !isValidEmail(emailInput.value.trim())) {
            showStatus('Please enter a valid email address.', 'error');
            emailInput.focus();
            return false;
        }
        if (!companyInput.value.trim()) {
            showStatus('Please enter your company name.', 'error');
            companyInput.focus();
            return false;
        }
        return true;
    }

    function resetForm() {
        firstNameInput.value = '';
        lastNameInput.value = '';
        emailInput.value = '';
        companyInput.value = '';
    }

    async function handleSubmit() {
        if (!validateForm()) {
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Processing...';
        showStatus('Verifying and processing your request...', 'loading');

        try {
            // Execute reCAPTCHA
            const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, { action: 'rightspend_form' });

            // Collect form data manually
            const data = {
                firstName: firstNameInput.value.trim(),
                lastName: lastNameInput.value.trim(),
                email: emailInput.value.trim(),
                company: companyInput.value.trim(),
                timestamp: new Date().toISOString(),
                source: 'CloudFix RightSpend Form',
                page_url: window.location.href,
                recaptcha_token: token,
                user_agent: navigator.userAgent,
                form_type: 'rightspend'
            };

            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...(WEBHOOK_SECRET ? { 'X-Webhook-Secret': WEBHOOK_SECRET } : {})
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showStatus('Thank you! Your RightSpend estimate request has been submitted. Our enterprise team will contact you within 24 hours to discuss your personalized assessment and 30-day free trial.', 'success');
                resetForm();
            } else {
                throw new Error('Network response was not ok');
            }
        } catch (error) {
            console.error('Form submission error:', error);
            showStatus('Sorry, there was an error processing your request. Please try again or contact our enterprise team directly.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Get RightSpend Estimate';
        }
    }

    // Button click handler
    submitBtn.addEventListener('click', function(e) {
        e.preventDefault();
        handleSubmit();
    });

    // Enter key support
    container.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSubmit();
        }
    });
})();
</script>
