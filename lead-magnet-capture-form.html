<!-- CloudFix Lead Magnet Capture Form - Embed this in WordPress -->
<div class="lead-magnet-form-wrapper">
    <style>
        .lead-magnet-form-wrapper {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .lead-magnet-form {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 40px auto;
        }

        .lead-magnet-form h3 {
            color: #1a365d;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .lead-magnet-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .lead-magnet-form-row {
                grid-template-columns: 1fr;
            }
        }

        .lead-magnet-form-group {
            margin-bottom: 20px;
        }

        .lead-magnet-form-group label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .lead-magnet-form-group.required label::after {
            content: ' *';
            color: #e53e3e;
        }

        .lead-magnet-form-group input,
        .lead-magnet-form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            background: #ffffff;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .lead-magnet-form-group input:focus,
        .lead-magnet-form-group select:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }

        .lead-magnet-submit-btn {
            background: linear-gradient(135deg, #3182ce 0%, #2c5aa0 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.3);
        }

        .lead-magnet-submit-btn:hover {
            background: linear-gradient(135deg, #2c5aa0 0%, #2a4a7c 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(49, 130, 206, 0.4);
        }

        .lead-magnet-submit-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .lead-magnet-form-status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 15px;
            display: none;
            text-align: center;
        }

        .lead-magnet-form-status.success {
            background: #f0fff4;
            color: #2f855a;
            border: 1px solid #9ae6b4;
        }

        .lead-magnet-form-status.error {
            background: #fed7d7;
            color: #c53030;
            border: 1px solid #feb2b2;
        }

        .lead-magnet-form-status.loading {
            background: #ebf8ff;
            color: #3182ce;
            border: 1px solid #90cdf4;
        }

        .lead-magnet-help-text {
            color: #718096;
            font-size: 12px;
            line-height: 1.5;
            text-align: center;
            margin-top: 20px;
        }
    </style>

    <div class="lead-magnet-form">
        <h3>Get the free checklist</h3>

        <div id="lead-magnet-capture-container">
            <div class="lead-magnet-form-group required">
                <label for="lm_email">Work email</label>
                <input type="email" id="lm_email" name="email">
            </div>

            <div class="lead-magnet-form-row">
                <div class="lead-magnet-form-group">
                    <label for="lm_company">Company</label>
                    <input type="text" id="lm_company" name="company">
                </div>

                <div class="lead-magnet-form-group">
                    <label for="lm_monthlySpend">Monthly AWS spend</label>
                    <select id="lm_monthlySpend" name="monthly_aws_spend">
                        <option value="" selected>Select range</option>
                        <option value="under_50k">Under $50K</option>
                        <option value="50k_200k">$50K - $200K</option>
                        <option value="200k_500k">$200K - $500K</option>
                        <option value="500k_1m">$500K - $1M</option>
                        <option value="over_1m">Over $1M</option>
                    </select>
                </div>
            </div>

            <button type="button" class="lead-magnet-submit-btn" id="lm_submit_btn">Send Me the Checklist →</button>
            <div class="lead-magnet-form-status" id="lm-form-status"></div>
        </div>

        <p class="lead-magnet-help-text">Free PDF. No sales call. Unsubscribe anytime.</p>
    </div>
</div>

<!-- Load configuration -->
<script src="config-local.js" onerror="this.src='config.js'"></script>
<script>
(function() {
    // Skip initialization in WordPress admin
    if (document.body.classList.contains('wp-admin')) {
        return;
    }

    // Use configuration or fallback values
    const config = window.CloudFixConfig || {};
    const WEBHOOK_URL = config.WEBHOOK_URL || 'https://automate.billgleeson.com/webhook/cloudfix-website-forms';
    const WEBHOOK_SECRET = config.WEBHOOK_SECRET || '';
    const RECAPTCHA_SITE_KEY = config.RECAPTCHA_SITE_KEY || '6LctAb8rAAAAAG900ftMg2zJq13aLpJa5joqZ9yb';

    // Dynamically load reCAPTCHA with the correct site key
    const recaptchaScript = document.createElement('script');
    recaptchaScript.src = `https://www.google.com/recaptcha/api.js?render=${RECAPTCHA_SITE_KEY}`;
    document.head.appendChild(recaptchaScript);

    const container = document.getElementById('lead-magnet-capture-container');
    const statusDiv = document.getElementById('lm-form-status');
    const submitBtn = document.getElementById('lm_submit_btn');
    const emailInput = document.getElementById('lm_email');
    const companyInput = document.getElementById('lm_company');
    const monthlySpendSelect = document.getElementById('lm_monthlySpend');

    function showStatus(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = `lead-magnet-form-status ${type}`;
        statusDiv.style.display = 'block';
    }

    function hideStatus() {
        statusDiv.style.display = 'none';
    }

    // Simple email validation
    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    function resetForm() {
        emailInput.value = '';
        companyInput.value = '';
        monthlySpendSelect.value = '';
    }

    async function handleSubmit() {
        const email = emailInput.value.trim();

        if (!email || !isValidEmail(email)) {
            showStatus('Please enter a valid work email address.', 'error');
            emailInput.focus();
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        showStatus('Verifying and sending your checklist...', 'loading');

        try {
            // Execute reCAPTCHA
            const token = await grecaptcha.execute(RECAPTCHA_SITE_KEY, { action: 'lead_magnet_capture' });

            // Collect form data manually
            const data = {
                email: email,
                company: companyInput.value.trim(),
                monthly_aws_spend: monthlySpendSelect.value,
                timestamp: new Date().toISOString(),
                source: 'CloudFix Lead Magnet Capture Form',
                page_url: window.location.href,
                recaptcha_token: token,
                user_agent: navigator.userAgent,
                form_type: 'lead_magnet_capture'
            };

            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...(WEBHOOK_SECRET ? { 'X-Webhook-Secret': WEBHOOK_SECRET } : {})
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showStatus('Success! Check your email for the checklist.', 'success');
                resetForm();
            } else {
                throw new Error('Network response was not ok');
            }
        } catch (error) {
            console.error('Lead magnet capture error:', error);
            showStatus('Sorry, there was an error sending your checklist. Please try again later.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Send Me the Checklist →';
        }
    }

    // Button click handler
    submitBtn.addEventListener('click', function(e) {
        e.preventDefault();
        handleSubmit();
    });

    // Enter key support
    container.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleSubmit();
        }
    });

    // Clear status when user starts typing again
    emailInput.addEventListener('input', function() {
        if (statusDiv.style.display === 'block' && statusDiv.classList.contains('error')) {
            hideStatus();
        }
    });
})();
</script>
